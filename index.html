<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Study - Pro Dash</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --accent: #00d2d3;
            --danger: #ff7675;
            --success: #55efc4;
            --glass: rgba(255, 255, 255, 0.9);
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: 40px 20px;
            color: #2d3436;
        }

        .container { max-width: 1000px; margin: auto; }

        h1 {
            color: white;
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .input-group {
            display: flex;
            gap: 10px;
            background: var(--glass);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
        }

        input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid transparent;
            border-radius: 10px;
            outline: none;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-add-main { background: var(--primary); color: white; }
        .btn-play { background: var(--success); color: white; }
        .btn-pause { background: var(--danger); color: white; }
        .btn-delete { background: #dfe6e9; color: #ff7675; padding: 8px; }
        .btn-delete:hover { background: #ff7675; color: white; }

        .card-materia {
            background: var(--glass);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .header-materia {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header-actions { display: flex; gap: 10px; }

        .item-estudo {
            background: white;
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-left: 5px solid #dfe6e9;
        }

        .item-info { flex: 1; }

        .item-estudo.active { 
            border-left-color: var(--success); 
            background: #f0fffb; 
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(85, 239, 196, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(85, 239, 196, 0); }
            100% { box-shadow: 0 0 0 0 rgba(85, 239, 196, 0); }
        }

        .timer-display {
            font-family: monospace;
            font-weight: 700;
            font-size: 1.1rem;
            background: #eee;
            padding: 5px 10px;
            border-radius: 8px;
            min-width: 90px;
            text-align: center;
        }

        .mural {
            background: rgba(45, 52, 54, 0.9);
            color: white;
            padding: 30px;
            border-radius: 20px;
            margin-top: 50px;
        }

        .mural-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #3d3d3d; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Nexus Study Pro</h1>
    <div class="input-group">
        <input type="text" id="novaMateria" placeholder="Qual matéria vamos conquistar hoje?">
        <button class="btn-add-main" id="btnCriarMateria">+ Criar Matéria</button>
    </div>
    <div id="app">Carregando Nexus...</div>
    <div class="mural">
        <h2>📊 Mural de Performance</h2>
        <div id="muralStats"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDPYTsZYMbp5HEvD-19is-cAguWGfOE8FY",
        authDomain: "estudo-nexus.firebaseapp.com",
        projectId: "estudo-nexus",
        storageBucket: "estudo-nexus.firebasestorage.app",
        messagingSenderId: "594949878863",
        appId: "1:594949878863:web:b4bdf2170785b1b31be63a",
        measurementId: "G-FYQ1ENZRS5"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const db = getFirestore(firebaseApp);
    const materiasRef = collection(db, "materias");

    let dados = [];
    let intervaloLocal = null;
    let itemAtivo = null; // { materiaId, itemId, segundos }

    // --- FUNÇÕES DE INTERFACE ---

    function formatar(s) {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
    }

    // Vincular funções ao window para que o HTML as encontre
    window.addMateria = async () => {
        const input = document.querySelector('#novaMateria');
        if(!input.value) return;
        try {
            await addDoc(materiasRef, { nome: input.value, itens: [] });
            input.value = '';
        } catch (e) { console.error("Erro ao adicionar:", e); }
    };

    document.getElementById('btnCriarMateria').addEventListener('click', window.addMateria);

    window.addItem = async (materiaId) => {
        const nomeItem = prompt("Nome da Aula/Atividade:");
        if(!nomeItem) return;
        const materia = dados.find(m => m.id === materiaId);
        const novosItens = [...materia.itens, {
            id: Date.now().toString(),
            nome: nomeItem,
            segundos: 0
        }];
        await updateDoc(doc(db, "materias", materiaId), { itens: novosItens });
    };

    window.deleteMateria = async (materiaId) => {
        if(confirm("Apagar matéria completa?")) {
            if(itemAtivo?.materiaId === materiaId) window.pararContador();
            await deleteDoc(doc(db, "materias", materiaId));
        }
    };

    window.deleteItem = async (materiaId, itemId) => {
        if(confirm("Apagar esta aula?")) {
            const materia = dados.find(m => m.id === materiaId);
            const novosItens = materia.itens.filter(i => i.id !== itemId);
            if(itemAtivo?.itemId === itemId) window.pararContador();
            await updateDoc(doc(db, "materias", materiaId), { itens: novosItens });
        }
    };

    window.toggleTimer = async (materiaId, itemId) => {
        // Se clicar no que já está rodando -> PAUSA
        if (itemAtivo && itemAtivo.itemId === itemId) {
            const mId = itemAtivo.materiaId;
            const iId = itemAtivo.itemId;
            const seg = itemAtivo.segundos;

            window.pararContador();
            await atualizarBanco(mId, iId, seg);
        } 
        // Se clicar em um novo
        else {
            // Se já tinha outro rodando, para e salva o anterior primeiro
            if (itemAtivo) {
                await atualizarBanco(itemAtivo.materiaId, itemAtivo.itemId, itemAtivo.segundos);
                window.pararContador();
            }

            // Inicia o novo
            const materia = dados.find(m => m.id === materiaId);
            const item = materia.itens.find(i => i.id === itemId);
            
            itemAtivo = { materiaId, itemId, segundos: item.segundos };
            
            intervaloLocal = setInterval(() => {
                itemAtivo.segundos++;
                const el = document.getElementById(`timer-${itemId}`);
                if(el) el.innerText = formatar(itemAtivo.segundos);
                atualizarMuralRapido();
            }, 1000);
            
            render(); 
        }
    };

    window.pararContador = () => {
        if (intervaloLocal) clearInterval(intervaloLocal);
        intervaloLocal = null;
        itemAtivo = null;
        render();
    };

    async function atualizarBanco(mId, iId, seg) {
        const materia = dados.find(m => m.id === mId);
        if(!materia) return;
        const novosItens = materia.itens.map(i => {
            if(i.id === iId) return { ...i, segundos: seg };
            return i;
        });
        await updateDoc(doc(db, "materias", mId), { itens: novosItens });
    }

    function atualizarMuralRapido() {
        const mural = document.getElementById('muralStats');
        let html = '';
        dados.forEach(m => {
            let total = m.itens.reduce((acc, curr) => {
                // Se for o item ativo, usa o tempo do cronômetro local
                if(itemAtivo && curr.id === itemAtivo.itemId) return acc + itemAtivo.segundos;
                return acc + curr.segundos;
            }, 0);
            html += `<div class="mural-item"><span>${m.nome}</span><strong>${formatar(total)}</strong></div>`;
        });
        mural.innerHTML = html;
    }

    function render() {
        const appDiv = document.getElementById('app');
        appDiv.innerHTML = '';

        dados.forEach(materia => {
            let itensHTML = materia.itens.map(item => {
                const isAtivo = itemAtivo?.itemId === item.id;
                const tempoExibir = isAtivo ? itemAtivo.segundos : item.segundos;
                
                return `
                    <div class="item-estudo ${isAtivo ? 'active' : ''}">
                        <div class="item-info"><strong>${item.nome}</strong></div>
                        <div class="timer-display" id="timer-${item.id}">${formatar(tempoExibir)}</div>
                        <button class="${isAtivo ? 'btn-pause' : 'btn-play'}" 
                                onclick="toggleTimer('${materia.id}', '${item.id}')">
                            ${isAtivo ? '⏸' : '▶'}
                        </button>
                        <button class="btn-delete" onclick="deleteItem('${materia.id}', '${item.id}')">🗑</button>
                    </div>`;
            }).join('');

            appDiv.innerHTML += `
                <div class="card-materia">
                    <div class="header-materia">
                        <h2>${materia.nome}</h2>
                        <div class="header-actions">
                            <button class="btn-add-main" onclick="addItem('${materia.id}')">+ Aula</button>
                            <button class="btn-delete" onclick="deleteMateria('${materia.id}')">🗑</button>
                        </div>
                    </div>
                    ${itensHTML || '<p style="text-align:center; opacity:0.6">Nenhuma aula cadastrada.</p>'}
                </div>`;
        });
        atualizarMuralRapido();
    }

    // LISTENER EM TEMPO REAL
    onSnapshot(materiasRef, (snapshot) => {
        const novosDados = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        dados = novosDados;
        // Se não houver nada rodando localmente, redesenha tudo
        if(!itemAtivo) render();
    });
</script>
</body>
</html>
