<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Study - Ultra Dash</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7;
            --accent: #00d2d3;
            --danger: #ff7675;
            --success: #55efc4;
            --warning: #f1c40f;
            --glass: rgba(255, 255, 255, 0.12);
            --glass-heavy: rgba(255, 255, 255, 0.25);
            --text-light: #f8f9fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: radial-gradient(circle at top right, #2d3436, #000000);
            min-height: 100vh;
            padding: 40px 20px;
            color: var(--text-light);
            overflow-x: hidden;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container { 
            max-width: 1100px; 
            margin: auto; 
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 40px;
            background: linear-gradient(to right, #a29bfe, #00d2d3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .input-group {
            display: flex;
            gap: 15px;
            background: var(--glass);
            padding: 20px;
            border-radius: 24px;
            margin-bottom: 50px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        input, textarea {
            flex: 1;
            padding: 15px 25px;
            border: none;
            border-radius: 15px;
            outline: none;
            background: rgba(255,255,255,0.05);
            color: white;
            transition: 0.3s;
        }

        input:focus, textarea:focus { background: rgba(255,255,255,0.15); }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .btn-add-main { background: var(--primary); color: white; }
        .btn-play { background: var(--success); color: #1e272e; }
        .btn-pause { background: var(--danger); color: white; }
        .btn-reset { background: var(--warning); color: #1e272e; }
        .btn-reset:active { transform: rotate(-10deg) scale(0.9); }

        .card-materia {
            background: var(--glass);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.4s;
        }

        .header-materia {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .item-estudo {
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #636e72;
            transition: 0.3s;
        }

        .item-estudo.active { 
            border-left-color: var(--success); 
            background: rgba(85, 239, 196, 0.1);
            transform: scale(1.01);
        }

        .flex-row { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; flex-wrap: wrap; }

        .timer-display {
            font-family: 'Courier New', monospace;
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--accent);
            min-width: 100px;
        }

        .extra-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .extra-box textarea { font-size: 0.85rem; height: 80px; resize: none; }

        .mural {
            background: var(--glass-heavy);
            padding: 40px;
            border-radius: 30px;
            margin-top: 60px;
            backdrop-filter: blur(20px);
        }

        .mural-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .btn-save-note {
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 0.75rem;
            padding: 8px 15px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✨ Nexus Study Pro</h1>
    
    <div class="input-group">
        <input type="text" id="novaMateria" placeholder="Qual será seu próximo domínio?">
        <button class="btn-add-main" id="btnCriarMateria">🚀 Criar Jornada</button>
    </div>

    <div id="app">Carregando dimensões...</div>

    <div class="mural">
        <h2>📊 Estatísticas Galácticas</h2>
        <div id="muralStats"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDPYTsZYMbp5HEvD-19is-cAguWGfOE8FY",
        authDomain: "estudo-nexus.firebaseapp.com",
        projectId: "estudo-nexus",
        storageBucket: "estudo-nexus.firebasestorage.app",
        messagingSenderId: "594949878863",
        appId: "1:594949878863:web:b4bdf2170785b1b31be63a",
        measurementId: "G-FYQ1ENZRS5"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const db = getFirestore(firebaseApp);
    const materiasRef = collection(db, "materias");

    let dados = [];
    let intervaloLocal = null;
    let itemAtivo = null;

    function formatar(s) {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
    }

    window.addMateria = async () => {
        const input = document.querySelector('#novaMateria');
        if(!input.value) return;
        await addDoc(materiasRef, { nome: input.value, itens: [] });
        input.value = '';
    };

    document.getElementById('btnCriarMateria').addEventListener('click', window.addMateria);

    window.addItem = async (materiaId) => {
        const nomeItem = prompt("Nome da Atividade:");
        if(!nomeItem) return;
        const materia = dados.find(m => m.id === materiaId);
        const novosItens = [...materia.itens, {
            id: Date.now().toString(),
            nome: nomeItem,
            segundos: 0,
            comentario: "",
            anotacao: ""
        }];
        await updateDoc(doc(db, "materias", materiaId), { itens: novosItens });
    };

    window.resetTimer = async (materiaId, itemId) => {
        if(confirm("Deseja zerar o tempo desta aula? Esta ação não pode ser desfeita.")) {
            if(itemAtivo && itemAtivo.itemId === itemId) {
                itemAtivo.segundos = 0;
                document.getElementById(`timer-${itemId}`).innerText = "00:00:00";
            }
            const materia = dados.find(m => m.id === materiaId);
            const novosItens = materia.itens.map(i => {
                if(i.id === itemId) return { ...i, segundos: 0 };
                return i;
            });
            await updateDoc(doc(db, "materias", materiaId), { itens: novosItens });
            if(!itemAtivo) render();
        }
    };

    window.saveExtra = async (materiaId, itemId) => {
        const comentario = document.getElementById(`coment-${itemId}`).value;
        const anotacao = document.getElementById(`note-${itemId}`).value;
        const materia = dados.find(m => m.id === materiaId);
        const novosItens = materia.itens.map(i => {
            if(i.id === itemId) return { ...i, comentario, anotacao };
            return i;
        });
        await updateDoc(doc(db, "materias", materiaId), { itens: novosItens });
        alert("Sincronizado com a nuvem!");
    };

    window.toggleTimer = async (materiaId, itemId) => {
        if (itemAtivo && itemAtivo.itemId === itemId) {
            const mId = itemAtivo.materiaId;
            const iId = itemAtivo.itemId;
            const seg = itemAtivo.segundos;
            window.pararContador();
            await atualizarBanco(mId, iId, seg);
        } else {
            if (itemAtivo) {
                await atualizarBanco(itemAtivo.materiaId, itemAtivo.itemId, itemAtivo.segundos);
                window.pararContador();
            }
            const materia = dados.find(m => m.id === materiaId);
            const item = materia.itens.find(i => i.id === itemId);
            itemAtivo = { materiaId, itemId, segundos: item.segundos };
            intervaloLocal = setInterval(() => {
                itemAtivo.segundos++;
                const el = document.getElementById(`timer-${itemId}`);
                if(el) el.innerText = formatar(itemAtivo.segundos);
                atualizarMuralRapido();
            }, 1000);
            render(); 
        }
    };

    window.pararContador = () => {
        if (intervaloLocal) clearInterval(intervaloLocal);
        intervaloLocal = null;
        itemAtivo = null;
        render();
    };

    async function atualizarBanco(mId, iId, seg) {
        const materia = dados.find(m => m.id === mId);
        if(!materia) return;
        const novosItens = materia.itens.map(i => {
            if(i.id === iId) return { ...i, segundos: seg };
            return i;
        });
        await updateDoc(doc(db, "materias", mId), { itens: novosItens });
    }

    function atualizarMuralRapido() {
        const mural = document.getElementById('muralStats');
        let html = '';
        dados.forEach(m => {
            let total = m.itens.reduce((acc, curr) => {
                if(itemAtivo && curr.id === itemAtivo.itemId) return acc + itemAtivo.segundos;
                return acc + curr.segundos;
            }, 0);
            html += `<div class="mural-item"><span>${m.nome}</span><strong>${formatar(total)}</strong></div>`;
        });
        mural.innerHTML = html;
    }

    window.deleteMateria = async (id) => confirm("Apagar matéria?") && await deleteDoc(doc(db, "materias", id));

    window.deleteItem = async (mId, iId) => {
        if(confirm("Remover aula?")) {
            const m = dados.find(x => x.id === mId);
            await updateDoc(doc(db, "materias", mId), { itens: m.itens.filter(i => i.id !== iId) });
        }
    };

    function render() {
        const appDiv = document.getElementById('app');
        appDiv.innerHTML = '';

        dados.forEach(materia => {
            let itensHTML = materia.itens.map(item => {
                const isAtivo = itemAtivo?.itemId === item.id;
                return `
                    <div class="item-estudo ${isAtivo ? 'active' : ''}">
                        <div class="flex-row">
                            <div style="flex:1"><strong>${item.nome}</strong></div>
                            <div class="timer-display" id="timer-${item.id}">${formatar(isAtivo ? itemAtivo.segundos : item.segundos)}</div>
                            
                            <button class="${isAtivo ? 'btn-pause' : 'btn-play'}" onclick="toggleTimer('${materia.id}', '${item.id}')">
                                ${isAtivo ? '⏸' : '▶'}
                            </button>
                            
                            <button class="btn-reset" title="Zerar Tempo" onclick="resetTimer('${materia.id}', '${item.id}')">
                                🔄
                            </button>
                            
                            <button onclick="deleteItem('${materia.id}', '${item.id}')" style="background:none; color:var(--danger)">🗑</button>
                        </div>
                        
                        <div class="extra-box">
                            <textarea id="coment-${item.id}" placeholder="Como foi essa aula?">${item.comentario || ''}</textarea>
                            <textarea id="note-${item.id}" placeholder="Principais tópicos...">${item.anotacao || ''}</textarea>
                        </div>
                        <button class="btn-save-note" onclick="saveExtra('${materia.id}', '${item.id}')">💾 Sincronizar Notas</button>
                    </div>`;
            }).join('');

            appDiv.innerHTML += `
                <div class="card-materia">
                    <div class="header-materia">
                        <h2>${materia.nome}</h2>
                        <div style="display:flex; gap:10px">
                            <button class="btn-add-main" onclick="addItem('${materia.id}')">+ Aula</button>
                            <button onclick="deleteMateria('${materia.id}')" style="background:none; color:white; opacity:0.5">🗑</button>
                        </div>
                    </div>
                    ${itensHTML || '<p style="text-align:center; opacity:0.4">Adicione uma aula para começar.</p>'}
                </div>`;
        });
        atualizarMuralRapido();
    }

    onSnapshot(materiasRef, (snapshot) => {
        dados = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        if(!itemAtivo) render();
    });
</script>
</body>
</html>
